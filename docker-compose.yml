services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  hasir-api:
    image: ghcr.io/protohasir/api:${API_TAG:-latest}
    restart: unless-stopped
    stop_grace_period: 30s
    expose:
      - "8080"
    ports:
      - "2222:2222"
    environment:
      HASIR_SERVER_PUBLICURL: https://${DOMAIN}/api
      HASIR_SERVER_SSHHOST: git@${DOMAIN}
      HASIR_SERVER_IP: 0.0.0.0
      HASIR_SERVER_PORT: 8080
      HASIR_POSTGRESQL_HOST: postgres
      HASIR_POSTGRESQL_PORT: 5432
      HASIR_POSTGRESQL_USERNAME: ${POSTGRES_USER}
      HASIR_POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD}
      HASIR_POSTGRESQL_DATABASE: ${POSTGRES_DB}
      HASIR_SMTP_HOST: ${SMTP_HOST}
      HASIR_SMTP_PORT: ${SMTP_PORT}
      HASIR_SMTP_USERNAME: ${SMTP_USERNAME}
      HASIR_SMTP_PASSWORD: ${SMTP_PASSWORD}
      HASIR_SMTP_FROM: ${SMTP_FROM}
      HASIR_SMTP_USETLS: ${SMTP_USE_TLS}
      HASIR_SSH_ENABLED: "true"
      HASIR_SSH_PORT: 2222
      HASIR_SSH_HOSTKEYPATH: /data/ssh/ssh_host_key
      HASIR_JWTSECRET: ${JWT_SECRET}
      HASIR_DASHBOARDURL: https://${DOMAIN}
      HASIR_SDKGENERATION_OUTPUTPATH: /data/sdk
    volumes:
      - ssh_keys:/data/ssh
      - repos:/data/repos
      - sdk:/data/sdk
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  hasir-dashboard:
    image: ghcr.io/protohasir/dashboard:${DASHBOARD_TAG:-latest}
    restart: unless-stopped
    stop_grace_period: 30s
    expose:
      - "3000"
    environment:
      NEXT_PUBLIC_API_URL: https://${DOMAIN}/api
    depends_on:
      hasir-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - frontend
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  nginx:
    container_name: nginx
    build:
      context: ./nginx
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - hasir-api
      - hasir-dashboard
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - frontend
      - backend
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/renew.sh:/renew.sh:ro
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --post-hook \"/bin/sh /renew.sh\"; sleep 12h & wait $${!}; done;'"
    networks:
      - frontend
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

networks:
  frontend:
  backend:

volumes:
  pgdata:
  ssh_keys:
  repos:
  sdk:
